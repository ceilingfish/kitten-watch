databases:
  - name: kitten-watch-db
    databaseName: kittenwatch
    user: kittenwatch
    plan: free

services:
  - type: cron
    name: kitten-watch
    runtime: python
    schedule: "0 8,18 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: RSS_FEED_URL
        value: https://rss.app/feeds/8ZEez9pneLj9S3q2.xml
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kitten-watch-db
          property: connectionString
